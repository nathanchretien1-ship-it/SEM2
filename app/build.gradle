apply plugin: 'com.android.application'

android {
    namespace 'com.ihealth.demo'
    compileSdkVersion 29
    buildToolsVersion '29.0.3'
    defaultConfig {
        applicationId "com.ihealth.demo"
        minSdkVersion 21
        targetSdkVersion 30
        versionCode 5
        versionName "1.2.1"
        testInstrumentationRunner "android.support.test.runner.AndroidJUnitRunner"
        multiDexEnabled true
        ndk {
            abiFilters 'armeabi', 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    sourceSets {
        main {
            jniLibs.srcDirs = ['libs']
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    //    compile fileTree(include: ['*.jar'], dir: 'libs')
    //jing 20170413 解决直接在手机上run的时候，默认使用的是debug的jar，导致无log输出的问题
    //    releaseCompile project(path: ':ihealthdevicesdk', configuration: 'release')
    //    debugCompile project(path: ':ihealthdevicesdk', configuration: 'debug')

//    implementation project(':ihealthdevicesdk')
    api files('libs/iHealthSDK_2.9.6.jar')
    implementation 'androidx.appcompat:appcompat:1.2.0'
    implementation 'io.reactivex.rxjava2:rxjava:2.1.9'

}
